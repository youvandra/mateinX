name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy backend
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SSH_HOST }} "
            set -e
            cd ~/mateinX
            git pull origin main
            cd backend
            npm install
            pm2 restart mateinx-backend
          "

      - name: Deploy frontend
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SSH_HOST }} "
            set -e
            cd ~/mateinX/frontend
            rm -rf .next node_modules
            npm install --legacy-peer-deps
            npm install @next/swc-linux-x64-gnu --legacy-peer-deps --no-save 2>/dev/null || true
            NEXT_PUBLIC_API_URL=http://43.134.86.221:3006 npx next build
            pm2 restart mateinx-frontend
          "
