name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} "
            set -e
            cd ~/mateinX
            git pull origin main
            cd backend
            npm ci
            pm2 restart mateinx-backend
          "

      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} "
            set -e
            cd ~/mateinX/frontend
            npm ci
            npm run build
            pm2 restart mateinx-frontend
          "

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} "
            sudo nginx -t && sudo systemctl reload nginx || true
          "
